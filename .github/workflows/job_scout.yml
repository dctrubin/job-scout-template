name: Job Scout

on:
  schedule:
    - cron: '45 9 * * *'    # ~4:45am CDT (3:45am CST)
    - cron: '52 21 * * *'   # ~3:52pm CST (4:52pm CDT)
  workflow_dispatch:        # allow manual runs from the Actions tab

jobs:
  scout:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-job-scout-v2

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write candidate profile
        env:
          CANDIDATE_PROFILE: ${{ secrets.CANDIDATE_PROFILE }}
        run: echo "$CANDIDATE_PROFILE" > profile.md

      - name: Run Job Scout
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 job_scout.py
